version: '3.8'

services:
  amazon2-front:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: amazon2-front
    ports:
      - "7777:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
